<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Expansion</title>
    <!-- Material Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles/navbar.css" />
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/details.css" />
</head>
<body>

    <nav class="navbar">
        <div class="logo">AnimeExpansion <span class="small">TV</span></div>
        <div class="search-wrapper">
          <div class="search-container">
            <input type="text" placeholder="Search Anime" />
          </div>
          <button class="icon-btn"><i class="search"></i></button>
          <button class="icon-btn"><i class="shuffle"></i></button>
        </div>
        <div class="right-buttons">
          <button class="icon-btn"><i class="noti"></i></button>
          <button class="icon-btn"><i class="account"></i></button>
        </div>
      </nav>

      <!-- Sidebar -->
    <div class="sidebar">
        <!-- Home Link -->
        <a href="#home" class="active">
          <span class="material-icons">home</span>
          <span>Home</span>
        </a>
        <!-- Profile Link -->
        <a href="#profile">
          <span class="material-icons">person</span>
          <span>Profile</span>
        </a>
        <!-- Settings Link -->
        <a href="#settings">
          <span class="material-icons">settings</span>
          <span>Settings</span>
        </a>
      </div>

      <!-- Main content -->
       <div class="main-wrapper">
        <div class="anime-header-container">
            <!--banner-->
            <div class="anime-banner" id="banner-bg"></div>

            <!--cover image +title-->
        <div class="anime-info-container">
            <img id="cover-img" alt="cover" />
            <h1 id="anime-title" class="anime-title">Loading...</h1>
        </div>
      </div>
    </div>
       
      <script src="../scripts/sidebar.js"></script>
      <script src="../scripts/info.js"></script>
    </body>
    </html>
